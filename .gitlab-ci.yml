# GitLab CI/CD Pipeline for LUCID
#
# This pipeline builds documentation and runs tests.
# Documentation is deployed to GitLab Pages on the default branch.

stages:
  - test
  - build
  - package
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"

# Cache pip downloads between jobs
cache:
  paths:
    - .cache/pip/

# ------------------------------------------------------------------------------
# Test Stage
# ------------------------------------------------------------------------------

lint:
  stage: test
  image: python:${PYTHON_VERSION}
  script:
    - pip install ruff
    - ruff check src/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: test
  image: python:${PYTHON_VERSION}
  variables:
    QT_QPA_PLATFORM: offscreen
  before_script:
    - apt-get update && apt-get install -y libdbus-1-3 libxkbcommon0 libxcb-cursor0 libegl1 libgl1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1
    - pip install -e ".[dev]"
  script:
    - pytest tests/ -v --tb=short
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true  # Remove once tests are stable

# ------------------------------------------------------------------------------
# Build Stage
# ------------------------------------------------------------------------------

build-docs:
  stage: build
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -e ".[docs]"
  script:
    - sphinx-build -b html docs docs/_build -W --keep-going
  artifacts:
    paths:
      - docs/_build/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ------------------------------------------------------------------------------
# Package Stage (Native App Builds)
# ------------------------------------------------------------------------------
# These jobs create native installers using Briefcase.
# They only run on tags (releases) to avoid lengthy builds on every commit.

.package-base:
  stage: package
  variables:
    PIP_FIND_LINKS: "$CI_PROJECT_DIR/dist"
  before_script:
    - pip install briefcase
    - ./scripts/build-wheels.sh
  rules:
    - if: $CI_COMMIT_TAG  # Only run on tags

package:linux:
  extends: .package-base
  tags: [linux]
  image: python:${PYTHON_VERSION}
  script:
    - briefcase create --no-input
    - briefcase build --no-input
    - briefcase package --no-input
  artifacts:
    paths:
      - build/lucid/linux/lucid-*.AppImage
    expire_in: 1 week

package:macos:
  extends: .package-base
  tags: [macos]
  script:
    - briefcase create --no-input
    - briefcase build --no-input
    - briefcase package --no-input
  artifacts:
    paths:
      - build/lucid/macos/LUCID-*.dmg
    expire_in: 1 week

package:windows:
  extends: .package-base
  tags: [windows]
  script:
    - briefcase create --no-input
    - briefcase build --no-input
    - briefcase package --no-input
  artifacts:
    paths:
      - build/lucid/windows/LUCID-*.msi
    expire_in: 1 week

# ------------------------------------------------------------------------------
# Deploy Stage
# ------------------------------------------------------------------------------

pages:
  stage: deploy
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -e ".[docs]"
  script:
    - sphinx-build -b html docs public -W --keep-going
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: documentation
    url: $CI_PAGES_URL
