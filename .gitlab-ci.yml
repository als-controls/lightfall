# GitLab CI/CD Pipeline for LUCID
#
# This pipeline builds documentation and runs tests.
# Documentation is deployed to GitLab Pages on the default branch.

stages:
  - test
  - sonar
  - build
  - package
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"

# Cache pip downloads between jobs
cache:
  paths:
    - .cache/pip/

# ------------------------------------------------------------------------------
# Test Stage
# ------------------------------------------------------------------------------

lint:
  stage: test
  image: python:${PYTHON_VERSION}
  script:
    - pip install ruff
    - ruff check src/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: test
  image: python:${PYTHON_VERSION}
  variables:
    QT_QPA_PLATFORM: offscreen
    QT_OPENGL: software
    QSG_RHI_BACKEND: "null"
    LIBGL_ALWAYS_SOFTWARE: "1"
  before_script:
    - apt-get update && apt-get install -y libdbus-1-3 libxkbcommon0 libxcb-cursor0 libegl1 libgl1 libopengl0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1
    - pip install -e ".[dev]"
  script:
    # PySide6 6.11 segfaults when Qt event loop ticks OpenGL-backed widgets
    # in headless Docker without GPU. Run with --forked to isolate crashes
    # to individual tests instead of killing the entire suite.
    - pip install pytest-xdist
    # pytest-xdist spawns fresh worker processes (not fork), so PySide6
    # state is cleanly initialized in each worker. Workers that crash
    # from PySide6 widget segfaults are replaced automatically.
    - >-
      pytest tests/ -v --tb=short -n auto
      --cov=src/lucid --cov-report=xml:coverage.xml
  artifacts:
    paths:
      - coverage.xml
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true  # Remove once tests are stable

# ------------------------------------------------------------------------------
# SonarQube Analysis
# ------------------------------------------------------------------------------

sonarqube:
  stage: sonar
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  needs:
    - job: test
      artifacts: true
      optional: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    policy: pull-push
    key: "sonar-cache-${CI_COMMIT_REF_SLUG}"
    paths:
      - "${SONAR_USER_HOME}/cache"
  script:
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}" -Dsonar.token="${SONAR_TOKEN}"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ------------------------------------------------------------------------------
# Build Stage
# ------------------------------------------------------------------------------

build-docs:
  stage: build
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -e ".[docs]"
  script:
    - sphinx-build -b html docs docs/_build -W --keep-going
  artifacts:
    paths:
      - docs/_build/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ------------------------------------------------------------------------------
# Package Stage (Native App Builds)
# ------------------------------------------------------------------------------
# These jobs create native installers using Briefcase.
# They only run on tags (releases) to avoid lengthy builds on every commit.

.package-base:
  stage: package
  variables:
    PIP_FIND_LINKS: "$CI_PROJECT_DIR/dist"
  before_script:
    - pip install briefcase
    - ./scripts/build-wheels.sh
  rules:
    - if: $CI_COMMIT_TAG  # Only run on tags

package:linux:
  extends: .package-base
  tags: [linux]
  image: python:${PYTHON_VERSION}
  script:
    - briefcase create --no-input
    - briefcase build --no-input
    - briefcase package --no-input
  artifacts:
    paths:
      - build/lucid/linux/lucid-*.AppImage
    expire_in: 1 week

package:macos:
  extends: .package-base
  tags: [macos]
  script:
    - briefcase create --no-input
    - briefcase build --no-input
    - briefcase package --no-input
  artifacts:
    paths:
      - build/lucid/macos/LUCID-*.dmg
    expire_in: 1 week

package:windows:
  stage: package
  tags: [windows]
  variables:
    PIP_FIND_LINKS: "$CI_PROJECT_DIR/dist"
  before_script:
    - pip install briefcase
    - powershell -ExecutionPolicy Bypass -File ./scripts/build-wheels.ps1
  script:
    - briefcase create --no-input
    - briefcase build --no-input
    - briefcase package --no-input
  artifacts:
    paths:
      - build/lucid/windows/LUCID-*.msi
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# ------------------------------------------------------------------------------
# Deploy Stage
# ------------------------------------------------------------------------------

pages:
  stage: deploy
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -e ".[docs]"
  script:
    - sphinx-build -b html docs public -W --keep-going
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: documentation
    url: $CI_PAGES_URL

# Publish Windows installer to GitLab Releases when a tag is pushed
release:windows:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: package:windows
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - MSI_FILE=$(ls build/lucid/windows/LUCID-*.msi | head -1)
    - echo "Found MSI - $MSI_FILE"
    - |
      release-cli create \
        --name "LUCID $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "Release $CI_COMMIT_TAG - Windows installer" \
        --assets-link "{\"name\":\"Windows Installer (MSI)\",\"url\":\"${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${MSI_FILE}?job=package%3Awindows\",\"link_type\":\"package\"}"
